CONFIG_GPIO=y
CONFIG_LOG=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Disable RTT log backend to avoid conflict with Tracealyzer RTT
CONFIG_LOG_BACKEND_RTT=n

# Tracealyzer
CONFIG_TRACING=y
CONFIG_PERCEPIO_TRACERECORDER=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Blink time in milliseconds
#CONFIG_BLINK_TIME_MS=500
